site_name: Hadoop Telemetry Stack
site_description: Transparent Big Data Observability — Spark / MR / Hive Telemetry Collection
repo_url: https://github.com/xmg333/hadoop-telemetry-stack

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - Deployment Guide:
      - Full Deployment: deployment-guide.md
      - Infrastructure: infrastructure.md
      - Troubleshooting: troubleshooting.md
  - Component Reference:
      - Spark Plugin: spark-plugin.md
      - MR Collector/Agent: mr-telemetry.md
      - Hive Hook: hive-hook.md
      - Flink Consumer: flink-consumer.md
      - Diagnostic Tool: diagnostic.md
  - Architecture: architecture.md
  - Configuration Reference: configuration-reference.md
  - Grafana Dashboards:
      - Overview: grafana-overview.md
      - Engine Views:
          - Spark: grafana-spark.md
          - MapReduce: grafana-mr.md
          - Hive on MR: grafana-hive-mr.md
          - Hive on Spark: grafana-hive-spark.md
          - All Engines: grafana-spark-mr-hive.md
      - Business Analysis:
          - Cost Attribution: grafana-cost-attribution.md
          - Performance Analysis: grafana-performance-analysis.md
          - IO Analysis: grafana-io-analysis.md
          - Reliability: grafana-reliability.md
          - Hive Analysis: grafana-hive-analysis.md
          - Capacity Planning: grafana-capacity.md
          - Efficiency Scoring: grafana-efficiency.md
  - Benchmarks: benchmarks.md
  - Release Guide: release.md
  - 中文文档: zh_cn/index.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - def_list
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search
  - mermaid2
