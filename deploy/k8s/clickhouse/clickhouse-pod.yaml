apiVersion: v1
kind: Pod
metadata:
  name: clickhouse
  labels:
    app: clickhouse
spec:
  containers:
  - name: clickhouse
    image: clickhouse/clickhouse-server:23.8-alpine
    ports:
    - containerPort: 8123
    - containerPort: 9000
    resources:
      requests:
        memory: "512Mi"
        cpu: "0.5"
      limits:
        memory: "1Gi"
        cpu: "1"
    livenessProbe:
      httpGet:
        path: /ping
        port: 8123
      initialDelaySeconds: 15
      periodSeconds: 10
    readinessProbe:
      httpGet:
        path: /ping
        port: 8123
      initialDelaySeconds: 5
      periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
spec:
  selector:
    app: clickhouse
  ports:
  - name: http
    port: 8123
  - name: native
    port: 9000
