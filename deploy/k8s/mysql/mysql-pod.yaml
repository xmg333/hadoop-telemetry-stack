apiVersion: v1
kind: Pod
metadata:
  name: mysql
  labels:
    app: mysql
spec:
  containers:
  - name: mysql
    image: mysql:8.0
    env:
    - name: MYSQL_ROOT_PASSWORD
      value: "CHANGE_ME"
    - name: MYSQL_DATABASE
      value: "metrics_db"
    - name: MYSQL_USER
      value: "metrics"
    - name: MYSQL_PASSWORD
      value: "CHANGE_ME"
    ports:
    - containerPort: 3306
    resources:
      requests:
        memory: "512Mi"
        cpu: "0.5"
      limits:
        memory: "1Gi"
        cpu: "1"
    livenessProbe:
      exec:
        command:
        - mysqladmin
        - ping
        - -h
        - localhost
        - -u
        - root
        - -pCHANGE_ME
      initialDelaySeconds: 30
      periodSeconds: 10
    readinessProbe:
      exec:
        command:
        - mysqladmin
        - ping
        - -h
        - localhost
        - -u
        - root
        - -pCHANGE_ME
      initialDelaySeconds: 15
      periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
spec:
  selector:
    app: mysql
  ports:
  - name: mysql
    port: 3306
