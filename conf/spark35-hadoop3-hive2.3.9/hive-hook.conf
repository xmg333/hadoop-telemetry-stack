# Hive Telemetry Hook — Hive 2.3.9
hive-telemetry {
  otel {
    exporter.endpoint = "http://otel-collector:4317"
    service.name = "hive-server2"
    export.interval.ms = 10000
  }
  metrics {
    enabled = true
    query.duration = true
    query.io = true
    query.tables = true
  }
  filter {
    user.include = [".*"]
    user.exclude = []
    operation.include = [".*"]
    operation.exclude = []
  }
}
