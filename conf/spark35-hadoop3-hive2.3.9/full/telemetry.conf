# Spark 3.5 + Hadoop 3 + Hive 2.3.9 — Full Metrics Preset
# All metrics enabled: task, stage, job, SQL, shuffle, extended remoteReqsDuration.

spark-telemetry {
  otel {
    exporter.endpoint = "http://otel-collector:4317"
    exporter.protocol = "grpc"
    service.name = "spark-application"
    export.interval.ms = 10000
  }
  metrics {
    task.execution = true
    task.shuffle-extended = true
    task.info = true
    stage.detailed = true
    job.lifecycle = true
    sql.query-execution = true
  }
  filter {
    app.name.include = [".*"]
    app.name.exclude = []
  }
}
