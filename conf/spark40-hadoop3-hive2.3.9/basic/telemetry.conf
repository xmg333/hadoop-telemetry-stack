# Spark 4.0 + Hadoop 3 + Hive 2.3.9 — Basic Metrics Preset
# Only core task execution metrics. Minimal overhead.
# Note: Spark 4.0 requires Java 17+ and Scala 2.13.

spark-telemetry {
  otel {
    exporter.endpoint = "http://otel-collector:4317"
    exporter.protocol = "grpc"
    service.name = "spark-application"
    export.interval.ms = 30000
  }
  metrics {
    task.execution = true
    task.shuffle-extended = false
    task.info = false
    stage.detailed = false
    job.lifecycle = false
    sql.query-execution = false
  }
  filter {
    app.name.include = [".*"]
    app.name.exclude = []
  }
}
