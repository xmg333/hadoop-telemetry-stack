# Hive Telemetry Hook — Hive 2.3.9
# Same config for all Spark versions. Deploy to HiveServer2 auxlib.
#
# hive-site.xml:
#   <property><name>hive.exec.post.hooks</name>
#     <value>x.mg.metrics.hivetelemetry.HiveTelemetryHook</value></property>
#   <property><name>hive.telemetry.otel.exporter.endpoint</name>
#     <value>http://otel-collector:4317</value></property>

hive-telemetry {
  otel {
    exporter.endpoint = "http://otel-collector:4317"
    service.name = "hive-server2"
    export.interval.ms = 10000
  }

  metrics {
    enabled = true
    query.duration = true
    query.io = true
    query.tables = true
  }

  filter {
    user.include = [".*"]
    user.exclude = []
    operation.include = [".*"]
    operation.exclude = []
  }
}
