# Flink Metrics Consumer — Kafka → ClickHouse
# Reads OTLP protobuf metrics from Kafka, writes to ClickHouse 11-table schema.
#
# Usage: java -jar metrics-flink-consumer-dist-*.jar /path/to/flink-consumer-clickhouse.conf

flink-consumer {
  kafka {
    bootstrap.servers = "kafka:9092"
    topic = "telemetry-metrics"
    group.id = "flink-metrics-consumer"
    startup.mode = "earliest-offset"
  }

  sink {
    type = "clickhouse"

    clickhouse {
      url = "jdbc:clickhouse://clickhouse:8123/metrics_db"
      user = "default"
      password = ""
      batch.size = 5000
      flush.interval.ms = 3000
    }
  }

  filter {
    metric.name.include = [".*"]
    metric.name.exclude = []
  }

  processing {
    parallelism = 2
  }
}
