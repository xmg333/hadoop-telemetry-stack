# Flink Metrics Consumer — Kafka → MySQL
# Flink DataStream job reading OTLP protobuf metrics from Kafka, writing to MySQL.
#
# Usage: java -jar metrics-flink-consumer-dist-*.jar /path/to/flink-consumer-mysql.conf
# Or:    flink run -c x.mg.metrics.flink.Main metrics-flink-consumer-dist-*.jar /path/to/flink-consumer-mysql.conf

flink-consumer {
  kafka {
    bootstrap.servers = "kafka:9092"
    topic = "telemetry-metrics"
    group.id = "flink-metrics-consumer"
    startup.mode = "earliest-offset"
    checkpoint.path = "/tmp/flink-consumer-checkpoint"
  }

  sink {
    type = "mysql"

    mysql {
      url = "jdbc:mysql://mysql:3306/metrics_db"
      user = "metrics"
      password = "metrics"
      batch.size = 1000
      flush.interval.ms = 5000
    }
  }

  filter {
    metric.name.include = [".*"]
    metric.name.exclude = []
  }

  processing {
    parallelism = 2
  }
}
