# Spark 2.4 + Hadoop 2.7 + Hive 2.3.9 — Full Metrics Preset
# All metrics enabled: task, stage, job, SQL, shuffle.
#
# Usage:
#   --conf spark.extraListeners=x.mg.metrics.sparktelemetry.adapter.SparkTelemetryListener
#   --conf spark.telemetry.config.path=/path/to/this/telemetry.conf
#   --conf spark.telemetry.otel.exporter.endpoint=http://otel-collector:4317

spark-telemetry {
  otel {
    exporter.endpoint = "http://otel-collector:4317"
    exporter.protocol = "grpc"
    service.name = "spark-application"
    export.interval.ms = 10000
  }

  metrics {
    task.execution = true
    task.shuffle-extended = true
    task.info = true
    stage.detailed = true
    job.lifecycle = true
    sql.query-execution = true
  }

  filter {
    app.name.include = [".*"]
    app.name.exclude = []
  }
}
