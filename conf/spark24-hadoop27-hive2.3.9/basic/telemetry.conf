# Spark 2.4 + Hadoop 2.7 + Hive 2.3.9 — Basic Metrics Preset
# Only core task execution metrics. Minimal overhead.
#
# Usage:
#   --conf spark.extraListeners=x.mg.metrics.sparktelemetry.adapter.SparkTelemetryListener
#   --conf spark.telemetry.config.path=/path/to/this/telemetry.conf
#   --conf spark.telemetry.otel.exporter.endpoint=http://otel-collector:4317

spark-telemetry {
  otel {
    exporter.endpoint = "http://otel-collector:4317"
    exporter.protocol = "grpc"
    service.name = "spark-application"
    export.interval.ms = 30000
  }

  metrics {
    # Category 1: Task execution (executor time, CPU, GC, scheduler delay, result size, peak memory)
    task.execution = true

    # Category 2: Extended shuffle (local/remote blocks, records, remote bytes to disk)
    task.shuffle-extended = false

    # Category 3: Task info (host, locality, speculative)
    task.info = false

    # Category 4: Stage detailed (duration, num tasks, executor time, GC, peak memory, stage IO)
    stage.detailed = false

    # Category 5: Job lifecycle (start/end, duration, num stages)
    job.lifecycle = false

    # Category 6: SQL query execution (duration, joins, table reads/writes)
    sql.query-execution = false
  }

  filter {
    app.name.include = [".*"]
    app.name.exclude = []
  }
}
