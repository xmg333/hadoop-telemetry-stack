# MR Telemetry Collector — Hadoop 2.7.x
# Polls Hadoop 2.7 History Server for completed MR job metrics.
#
# Usage: java -jar omnipackage.jar --mr-collector /path/to/mr-collector.conf
#   or:  java -jar mr-telemetry-dist-*.jar /path/to/mr-collector.conf

mr-telemetry {
  history-server {
    url = "http://hadoop-historyserver:19888"
    poll.interval.secs = 30
    connect.timeout.secs = 10
    read.timeout.secs = 30
  }

  otel {
    exporter.endpoint = "http://otel-collector:4317"
    exporter.protocol = "grpc"
    service.name = "mr-telemetry-collector"
    export.interval.ms = 10000
  }

  state {
    file = "/tmp/mr-telemetry-state.json"
  }

  filter {
    user.include = [".*"]
    user.exclude = []
    job.name.include = [".*"]
    job.name.exclude = []
  }

  collection {
    job.counters = true
    task.counters = false
    job.details = true
  }
}
